        }

            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {

            }
        }

        .form-section {
            background: rgba(255, 255, 255, 0.05);

            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-section h2 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #4facfe;
        }

        .form-group {

        }

        .form-group label {

            margin-bottom: 8px;
            font-weight: 500;
            color: #e2e8f0;
        }

            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .form-group input::placeholder {
            color: #718096;
        }

        .preview-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;

        }

            margin-bottom: 20px;

            background: #ffffff;
            border-radius: 8px;
            padding: 15px;
            width: auto;

            max-width: 700px;

        }

        .btn-secondary:hover {

            transform: translateY(-2px);

            right: 30px;

            color: #1a1a2e;

            border-radius: 10px;
            font-weight: 600;

        }

        .toast.show {
            transform: translateY(0);

        }

        .hidden {
            display: none;
        }

        // Função para carregar funções do GitHub CSV (base de dados principal)
        async function carregarFuncoesDoGoogleSheets() {
            try {
                console.log('Carregando funções do GitHub...');
                funcaoInput.placeholder = 'Carregando funções...';
                
                const response = await fetch(URL_FUNCOES);
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
                
                // Obter o conteúdo como ArrayBuffer para controlar a decodificação
                const buffer = await response.arrayBuffer();
                
                // Tentar decodificar como UTF-8
                let csvText;
                try {
                    const decoder = new TextDecoder('utf-8', { fatal: true });
                    csvText = decoder.decode(buffer);
                } catch (e) {
                    // Se falhar, tentar Windows-1252 (comum em arquivos do Excel)
                    const decoder = new TextDecoder('windows-1252');
                    csvText = decoder.decode(buffer);
                }
                
                // Remover BOM (Byte Order Mark) se presente
                csvText = csvText.replace(/^\uFEFF/, '');
                
                // Processar CSV - cada linha é uma função
                const linhas = csvText.split(/\r?\n/);
                const funcoes = linhas
                    .map(linha => {
                        // Remover aspas e espaços
                        let texto = linha.replace(/"/g, '').trim();
                        // Remover caracteres de controle invisíveis
                        texto = texto.replace(/[\x00-\x1F\x7F]/g, '');
                        return texto;
                    })
                    .filter(linha => linha.length > 0);
                
                console.log(`Carregadas ${funcoes.length} funções do GitHub`);
                console.log('Primeiras 5 funções:', funcoes.slice(0, 5));
                return funcoes;
                
            } catch (error) {
                console.error('Erro ao carregar planilha:', error);
                showToast('Erro ao carregar funções. Verifique a conexão.');
                return [];
            }
        }

        // Função para destacar o texto que corresponde à busca
        function highlightMatch(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${search})`, 'gi');
            return text.replace(regex, '<span class="autocomplete-item-highlight">$1</span>');
        }

        // Filtrar e mostrar sugestões
        function showSuggestions(searchText) {
            const search = searchText.toLowerCase().trim();
            funcaoList.innerHTML = '';
            activeIndex = -1;

            if (search.length === 0) {
                // Mostrar todas as opções quando o campo está vazio mas focado
                FUNCOES.forEach((funcao, index) => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item';
                    item.innerHTML = funcao;
                    item.dataset.index = index;
                    item.addEventListener('click', () => selectFuncao(funcao));
                    funcaoList.appendChild(item);
                });
                funcaoList.classList.add('show');
                return;
            }

            // Filtrar funções que contêm o texto digitado
            const filtered = FUNCOES.filter(f => 
                f.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                funcaoList.innerHTML = '<div class="autocomplete-no-results">Nenhuma função encontrada</div>';
                funcaoList.classList.add('show');
                return;
            }

            filtered.forEach((funcao, index) => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.innerHTML = highlightMatch(funcao, searchText);
                item.dataset.index = index;
                item.addEventListener('click', () => selectFuncao(funcao));
                funcaoList.appendChild(item);
            });

            funcaoList.classList.add('show');
        }

        // Selecionar uma função

            funcaoInput.value = funcao;

        // Navegação por teclado
        function handleKeydown(e) {
            const items = funcaoList.querySelectorAll('.autocomplete-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
                updateActiveItem(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, 0);
                updateActiveItem(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (activeIndex >= 0 && items[activeIndex]) {
                    items[activeIndex].click();
                } else if (funcaoInput.value.trim()) {
                    funcaoList.classList.remove('show');
                    updatePreview();
                }
            } else if (e.key === 'Escape') {
                funcaoList.classList.remove('show');
            }
        }

        function updateActiveItem(items) {
            items.forEach((item, index) => {
                item.classList.toggle('active', index === activeIndex);
                if (index === activeIndex) {
                    item.scrollIntoView({ block: 'nearest' });
                }
            });
        }

        function copyAsRichText() {

        async function loadImageAsBase64(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    try {
                        resolve(canvas.toDataURL('image/png'));
                    } catch (e) {
                        resolve(url);
                    }
                };
                img.onerror = () => resolve(url);
                img.src = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
            });
        }

        async function convertImagesToBase64(element) {
            const images = element.querySelectorAll('img');
            for (const img of images) {
                if (img.src && !img.src.startsWith('data:')) {
                    try {
                        const base64 = await loadImageAsBase64(img.src);
                        if (base64.startsWith('data:')) {
                            img.src = base64;
                        }
                    } catch (e) {
                        console.log('Não foi possível converter imagem:', e);
                    }
                }
            }
            await new Promise(resolve => setTimeout(resolve, 100));
        }

        async function downloadAsPNG() {
            const signatureContent = document.getElementById('signatureContent');
            const nome = nomeInput.value.trim();
            const marca = marcaSelect.value;
            const loja = lojaSelect.value;

            if (!marca || !loja || !nome) {
                showToast('Preencha todos os campos primeiro!');
                return;
            }

            try {
                showToast('Carregando imagens...');
                
                await convertImagesToBase64(signatureContent);
                
                showToast('Gerando imagem...');
                
                const contentWidth = signatureContent.scrollWidth;
                const originalCanvas = await html2canvas(signatureContent, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    allowTaint: false,
                    logging: false,
                    width: contentWidth,
                    windowWidth: contentWidth + 50,
                    onclone: function(clonedDoc) {
                        const clonedImages = clonedDoc.querySelectorAll('img');
                        clonedImages.forEach(img => {
                            img.crossOrigin = 'anonymous';
                        });
                    }
                });

                const padding = 16;
                const borderRadius = 16;
                
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = originalCanvas.width + (padding * 2);
                finalCanvas.height = originalCanvas.height + (padding * 2);
                
                const ctx = finalCanvas.getContext('2d');
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                
                function roundRect(ctx, x, y, width, height, radius) {
                    ctx.beginPath();
                    ctx.moveTo(x + radius, y);
                    ctx.lineTo(x + width - radius, y);
                    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                    ctx.lineTo(x + width, y + height - radius);
                    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                    ctx.lineTo(x + radius, y + height);
                    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                    ctx.lineTo(x, y + radius);
                    ctx.quadraticCurveTo(x, y, x + radius, y);
                    ctx.closePath();
                }
                
                ctx.save();
                roundRect(ctx, padding, padding, originalCanvas.width, originalCanvas.height, borderRadius);
                ctx.clip();
                ctx.drawImage(originalCanvas, padding, padding);
                ctx.restore();
                
                ctx.strokeStyle = '#d0d0d0';
                ctx.lineWidth = 2;
                roundRect(ctx, padding, padding, originalCanvas.width, originalCanvas.height, borderRadius);
                ctx.stroke();

                const link = document.createElement('a');
                link.download = `assinatura_${nome.replace(/\s+/g, '_')}.png`;
                link.href = finalCanvas.toDataURL('image/png', 1.0);
                link.click();

                showToast('PNG baixado com sucesso!');
            } catch (error) {
                console.error('Erro ao gerar PNG:', error);
                showToast('Erro ao gerar imagem. Tente novamente.');
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);

            document.body.removeChild(textarea);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
